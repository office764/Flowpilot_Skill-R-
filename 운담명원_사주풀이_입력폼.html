<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>운담명원 - 사주풀이 상담 신청</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background-color: #f5f0e8;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
  }

  .form-container {
    width: 100%;
    max-width: 520px;
    background: #ffffff;
    border-radius: 0;
    overflow: hidden;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.12);
  }

  /* ===== HEADER ===== */
  .form-header {
    background: #4a5a3c;
    padding: 48px 32px 44px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .form-header::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.04) 0%, transparent 70%);
  }

  .brand-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 42px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: 12px;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }

  .brand-subtitle {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.55);
    letter-spacing: 6px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  .seal-stamp {
    position: absolute;
    top: 18px;
    right: 22px;
    width: 52px;
    height: 52px;
    border: 2.5px solid #c4392d;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: rotate(-15deg);
    z-index: 1;
  }

  .seal-stamp span {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    font-weight: 700;
    color: #c4392d;
    letter-spacing: 1px;
  }

  /* ===== SECTION BANNER ===== */
  .section-banner {
    background: #e8e2d4;
    padding: 20px 32px;
    text-align: center;
    border-bottom: 1px solid #d9d1c0;
  }

  .section-banner h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: 18px;
    font-weight: 600;
    color: #4a5a3c;
    letter-spacing: 3px;
  }

  .section-banner p {
    font-size: 12px;
    color: #8a7e6b;
    margin-top: 6px;
    letter-spacing: 0.5px;
  }

  /* ===== FORM BODY ===== */
  .form-body {
    padding: 32px;
    background: #faf8f4;
  }

  .form-section-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    font-weight: 600;
    color: #4a5a3c;
    padding-bottom: 10px;
    margin-bottom: 20px;
    border-bottom: 1.5px solid #4a5a3c;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .form-section-title .dot {
    width: 6px;
    height: 6px;
    background: #c4392d;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #3d3d3d;
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }

  .form-group label .required {
    color: #c4392d;
    margin-left: 2px;
  }

  .form-group input[type="text"],
  .form-group input[type="number"],
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #d4cfc4;
    border-radius: 4px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    color: #2d2d2d;
    background: #ffffff;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: #4a5a3c;
    box-shadow: 0 0 0 3px rgba(74, 90, 60, 0.1);
  }

  .form-group textarea {
    min-height: 90px;
    resize: vertical;
    line-height: 1.6;
  }

  .form-group select {
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234a5a3c' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 12px center;
    background-size: 16px;
    padding-right: 36px;
  }

  /* ===== RADIO GROUP ===== */
  .radio-group {
    display: flex;
    gap: 12px;
  }

  .radio-option {
    flex: 1;
    position: relative;
  }

  .radio-option input[type="radio"] {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
  }

  .radio-option label {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 11px 0;
    border: 1px solid #d4cfc4;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 400;
    color: #5a5a5a;
    cursor: pointer;
    transition: all 0.2s;
    background: #ffffff;
    margin-bottom: 0;
  }

  .radio-option input[type="radio"]:checked + label {
    background: #4a5a3c;
    color: #ffffff;
    border-color: #4a5a3c;
    font-weight: 500;
  }

  /* ===== DATE ROW ===== */
  .date-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  .time-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .form-group .unit-label {
    font-size: 12px;
    color: #8a8a8a;
    margin-top: 4px;
    text-align: center;
  }

  /* ===== TOGGLE ===== */
  .toggle-section {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px dashed #d4cfc4;
  }

  .toggle-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    padding: 12px 16px;
    background: #eee9dc;
    border-radius: 4px;
    margin-bottom: 0;
    transition: background 0.2s;
  }

  .toggle-header:hover {
    background: #e6e0d0;
  }

  .toggle-header span {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    font-weight: 600;
    color: #4a5a3c;
    letter-spacing: 1px;
  }

  .toggle-arrow {
    font-size: 18px;
    color: #4a5a3c;
    transition: transform 0.3s;
  }

  .toggle-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }

  .toggle-content.open {
    max-height: 800px;
  }

  .toggle-content .inner-padding {
    padding: 24px 0 0;
  }

  /* ===== DIVIDER ===== */
  .form-divider {
    height: 1px;
    background: linear-gradient(to right, transparent, #c4b99a, transparent);
    margin: 28px 0;
  }

  /* ===== SUBMIT ===== */
  .submit-section {
    padding: 0 32px 36px;
    background: #faf8f4;
  }

  .submit-btn {
    width: 100%;
    padding: 16px;
    background: #4a5a3c;
    color: #ffffff;
    border: none;
    border-radius: 4px;
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 4px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .submit-btn:hover {
    background: #3d4d31;
  }

  .submit-btn:active {
    transform: scale(0.99);
  }

  .submit-note {
    text-align: center;
    margin-top: 14px;
    font-size: 11px;
    color: #a09888;
    line-height: 1.6;
  }

  /* ===== FOOTER ===== */
  .form-footer {
    background: #4a5a3c;
    padding: 20px 32px;
    text-align: center;
  }

  .form-footer p {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.45);
    letter-spacing: 1px;
  }

  /* ===== PLACEHOLDER ===== */
  ::placeholder {
    color: #b8b2a4;
    font-size: 13px;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 560px) {
    body {
      padding: 0;
    }
    .form-container {
      border-radius: 0;
    }
    .form-header {
      padding: 36px 24px 32px;
    }
    .brand-title {
      font-size: 32px;
      letter-spacing: 8px;
    }
    .form-body, .submit-section {
      padding-left: 20px;
      padding-right: 20px;
    }
    .seal-stamp {
      width: 42px;
      height: 42px;
      top: 14px;
      right: 14px;
    }
    .seal-stamp span {
      font-size: 13px;
    }
  }
</style>
</head>

<script>
  function toggleGunghap() {
    const section = document.getElementById('gunghapSection');
    const arrow = document.getElementById('toggleArrow');
    section.classList.toggle('open');
    arrow.style.transform = section.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
  }

  document.getElementById('sajuForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const data = {};
    formData.forEach((value, key) => {
      data[key] = value;
    });

    const gunghapSection = document.getElementById('gunghapSection');
    data['is궁합'] = gunghapSection.classList.contains('open') &&
      (data['2.이름'] || data['2.년']);

    console.log('Form Data:', JSON.stringify(data, null, 2));
    alert('상담 신청이 접수되었습니다.\n확인 후 결과를 보내드리겠습니다.');
  });
</script>
